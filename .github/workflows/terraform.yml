name: Terraform PagerDuty

on:
  repository_dispatch:
    types: [terraform_request]

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: pd-terraform
        run: terraform init

      - name: Create tfvars
        working-directory: pd-terraform
        run: |
          echo "username = \"${{ github.event.client_payload.username }}\"" > dynamic.tfvars
          echo "email = \"${{ github.event.client_payload.email }}\"" >> dynamic.tfvars
          echo "role = \"${{ github.event.client_payload.role }}\"" >> dynamic.tfvars

      - name: Terraform Apply
        working-directory: pd-terraform
        run: terraform apply -auto-approve -var-file=dynamic.tfvars
